<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HKMOD - Hong Kong Members Only Dating</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Block Kimi Agent widget injection
      (function() {
        var blocked = ['kimi.com/sdk', 'moonshot.cn/sdk']
        var removeKimi = function() {
          var scripts = document.querySelectorAll('script')
          scripts.forEach(function(s) {
            var src = s.src || ''
            blocked.forEach(function(b) {
              if (src.indexOf(b) !== -1) { s.remove() }
            })
          })
          var links = document.querySelectorAll('a[href*="kimi.com/agent"]')
          links.forEach(function(a) { a.remove() })
        }
        removeKimi()
        var obs = new MutationObserver(removeKimi)
        obs.observe(document.documentElement, { childList: true, subtree: true })
        setInterval(removeKimi, 500)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Debug: if React crashes, this stays visible -->
    <div id="debug-fallback" style="position:fixed;bottom:0;left:0;right:0;background:#000;color:#FF6B35;font-family:monospace;font-size:10px;padding:4px;z-index:99999">Booting...</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
