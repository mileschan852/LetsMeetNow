name: Deploy HKMOD to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'apps/hkmod/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/deploy-hkmod.yml'
  workflow_dispatch:
jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger HKMO_D_Bot deployment
        # Note: This requires a GH_PAT secret with repo scope.
        # If not configured, HKMOD will still deploy via the hourly cron job in HKMO_D_Bot repo.
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: mileschan852/HKMO_D_Bot
          event-type: deploy-hkmod
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
