name: Deploy LMN to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/lmn/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/lmn-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-lmn"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install UI package dependencies
        working-directory: packages/ui
        run: npm ci
      
      - name: Install LMN dependencies
        working-directory: apps/lmn
        run: npm ci
      
      - name: Build
        working-directory: apps/lmn
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/lmn/dist

  deploy:
    environment:
      name: github-pages-lmn
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
