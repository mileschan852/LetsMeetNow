name: Deploy HKMOD to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/hkmod/**'
      - '.github/workflows/hkmod-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-hkmod"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/hkmod/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/hkmod
        run: npm ci
      
      - name: Build
        working-directory: apps/hkmod
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/hkmod/dist

  deploy:
    environment:
      name: github-pages-hkmod
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
